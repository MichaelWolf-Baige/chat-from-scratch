# Phase 1 Training Configuration
# ~14M model on ~200M-1B tokens
# Goal: Pipeline verification, not convergence

# ── Model ──
model_config: configs/model/phase1.yaml

# ── Data ──
data_config: configs/data/pretrain.yaml
train_data_path: data/tokenized/phase1/train.bin
eval_data_path: data/tokenized/phase1/eval.bin

# ── Optimization ──
optimizer: adamw
learning_rate: 3.0e-4
weight_decay: 0.1
betas: [0.9, 0.95]
eps: 1.0e-8

# ── Learning Rate Schedule ──
warmup_steps: 500
total_steps: 10000          # 200M tokens / (batch_size * seq_len) ≈ steps
lr_min: 1.0e-6
lr_schedule: "cosine"

# ── Training ──
batch_size: 32              # Per-GPU batch size
gradient_accumulation_steps: 1
eval_every: 500
log_every: 10
save_every: 1000
save_total_limit: 10

# ── Precision ──
mixed_precision: "bf16"     # "none" | "fp16" | "bf16"

# ── Gradient Control ──
max_grad_norm: 1.0

# ── Distributed (Phase 2+) ──
distributed: false
num_gpus: 1

# ── Reproducibility ──
seed: 42

# ── Logging ──
log_dir: logs/phase1/
use_wandb: false            # Set to true after testing

# ── Checkpoints ──
checkpoint_dir: checkpoints/phase1/
resume_from: null           # Path to checkpoint, or null

# ── Compute budget ──
target_tokens: 1_000_000_000  # 1B tokens (5x Chinchilla optimal for exploration)
estimated_gpu_hours: 20       # Single 3090, 14M model
notes: >
  Phase 1 goal is NOT to converge.
  We intentionally train 5x beyond Chinchilla optimal (200M tokens for 14M model)
  to: (1) verify pipeline stability over long runs,
  (2) observe loss curve tail behavior,
  (3) accumulate training log experience.
